version: '3.8'

services:
  glance:
    build: .
    ports:
      - "8013:8013"
    volumes:
      # 可选：挂载数据目录用于加载本地模型文件
      - ./data:/usr/share/nginx/html/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9999/"]
      interval: 30s
      timeout: 10s
      retries: 3
