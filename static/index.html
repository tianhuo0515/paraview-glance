<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google" value="notranslate">
    <title>可视化</title>
    <link id="app-favicon" rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'></svg>">
    <meta name="description" content="Data Viewer in a browser">
    <style type="text/css">
    html {
      overflow: hidden !important;
      width: 100%;
    }
    body {
      width: 100%;
      height: 100%;
      position: fixed;
      overflow-y: scroll;
    }
    /* Force remove any favicon */
    link[rel*="icon"] { display: none !important; }
    </style>
    <% for (key in htmlWebpackPlugin.files.css) { %>
    <link inline type="text/css" rel="stylesheet" href="<%= htmlWebpackPlugin.files.css[key] %>" />
    <% } %>
    <% if (webpackConfig.mode === 'production' && googleAnalytics) { %>
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-90338862-10"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'UA-90338862-10');
    </script>
    <% } %>
    <script inline type="text/javascript" src="version.js"></script>
    <% for (key in htmlWebpackPlugin.files.js) { %>
      <script
        <% if (!htmlWebpackPlugin.files.js[key].startsWith('glance-external-')) { %> inline <% } %>
        type="text/javascript"
        src="<%= htmlWebpackPlugin.files.js[key] %>"
      ></script>
    <% } %>
  </head>
  <body>
    <div id="root-container"></div>
    <script type="text/javascript">
      const container = document.querySelector('#root-container');
      const glanceInstance = Glance.createViewer(container);
      glanceInstance.processURLArgs();

      // Remove all dynamic favicons injected by vtk.js
      (function cleanFavicon() {
        var head = document.querySelector('head');
        if (!head) return setTimeout(cleanFavicon, 100);
        function remove() {
          var links = head.querySelectorAll('link[rel="icon"]');
          for (var i = 0; i < links.length; i++) {
            if (links[i].id !== 'app-favicon') links[i].remove();
          }
        }
        remove();
        new MutationObserver(remove).observe(head, { childList: true });
        setInterval(remove, 2000);
      })();
    </script>
  </body>
</html>
