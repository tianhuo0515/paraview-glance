<v-card flat>
  <v-card-title>
    <span class="body-2">Enter your raw data specs below:</span>
  </v-card-title>
  <v-card-text>
    <v-container grid-list-xs class="pa-0">
      <v-layout row align-center>
        <v-flex xs3 class="body-2">文件名：</v-flex>
        <v-flex xs9 class="body-1">{{ file.name }}</v-flex>
      </v-layout>
      <v-layout row align-center>
        <v-flex xs3 class="body-2">文件大小：</v-flex>
        <v-flex xs9 class="body-1">{{ file.size }} bytes</v-flex>
      </v-layout>
      <v-layout row align-center>
        <v-flex xs3 class="body-2">数据类型：</v-flex>
        <v-flex xs9 class="body-1">
          <v-select
            :items="allDataTypes"
            v-model="dataType"
            item-text="label"
            item-value="label"
            single-line
            return-object
          />
        </v-flex>
      </v-layout>
      <v-layout row align-center>
        <v-flex xs3 class="body-2">维度：</v-flex>
        <v-flex
          v-for="i in 3"
          :key="i"
          xs3
          class="body-1"
        >
          <v-text-field
            type="number"
            min="1"
            :max="file.size"
            v-model="dimensions[i-1]"
          />
        </v-flex>
      </v-layout>
      <v-layout row align-center>
        <v-flex xs3 class="body-2">间距：</v-flex>
        <v-flex
          v-for="i in 3"
          :key="i"
          xs3
          class="body-1"
        >
          <v-text-field
            type="number"
            min="1"
            :max="file.size"
            v-model="spacing[i-1]"
          />
        </v-flex>
      </v-layout>
      <v-layout row align-center>
        <v-flex xs3>有效大小：</v-flex>
        <v-flex xs3>{{ effectiveSize }}</v-flex>
        <v-flex xs6>
          <span
            v-if="effectiveSize !== file.size"
            class="red--text"
          >
            有效大小与总大小不匹配！
          </span>
          <span v-else class="teal--text">有效大小与文件大小匹配</span>
        </v-flex>
      </v-layout>
    </v-container>
  </v-card-text>
</v-card>
